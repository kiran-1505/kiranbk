<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Kiran B K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0815;
  --bg2: #141025;
  --bg3: #1c1733;
  --border: rgba(255,255,255,0.08);
  --purple: #8b5cf6;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --amber: #f59e0b;
  --emerald: #10b981;
  --text: #f1f5f9;
  --muted: #a5a3b8;
  --card: rgba(255,255,255,0.04);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Animated mesh background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(139,92,246,0.25), transparent 45%),
    radial-gradient(circle at 85% 30%, rgba(236,72,153,0.2), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(6,182,212,0.18), transparent 50%),
    radial-gradient(circle at 90% 90%, rgba(245,158,11,0.15), transparent 45%);
  z-index: -2;
  pointer-events: none;
  animation: meshShift 20s ease-in-out infinite alternate;
}

@keyframes meshShift {
  0%   { transform: translate(0,0) scale(1); }
  50%  { transform: translate(2%,-1%) scale(1.05); }
  100% { transform: translate(-1%,2%) scale(1); }
}

/* Floating blobs */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  pointer-events: none;
  z-index: -1;
}
.blob-1 { width: 400px; height: 400px; background: var(--purple); top: -100px; left: -100px; animation: float 18s ease-in-out infinite; }
.blob-2 { width: 350px; height: 350px; background: var(--pink); bottom: -80px; right: -80px; animation: float 22s ease-in-out infinite reverse; }
.blob-3 { width: 250px; height: 250px; background: var(--cyan); top: 40%; right: 10%; animation: float 25s ease-in-out infinite; }

@keyframes float {
  0%, 100% { transform: translate(0, 0); }
  33%  { transform: translate(40px, -30px); }
  66%  { transform: translate(-30px, 40px); }
}

main { flex: 1; position: relative; z-index: 1; }

/* ─── NAV ─── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(11,8,21,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-weight: 800;
  font-size: 1.15rem;
  background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
  text-decoration: none;
  animation: gradientShift 5s ease infinite;
}
@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.nav-links { display: flex; gap: 1.75rem; list-style: none; }
.nav-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 500;
  transition: color 0.2s;
  position: relative;
  padding: 0.25rem 0;
}
.nav-links a:hover { color: var(--text); }
.nav-links a.active {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}
.nav-links a.active::after {
  content: '';
  position: absolute;
  bottom: -6px; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--purple), var(--pink));
  border-radius: 2px;
}

.nav-toggle {
  display: none;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.4rem 0.7rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
}

@media(max-width:760px) {
  .nav-toggle { display: block; }
  .nav-links {
    display: none;
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: rgba(11,8,21,0.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    flex-direction: column;
    padding: 1.25rem 2rem;
    gap: 1rem;
  }
  .nav-links.open { display: flex; }
}

/* ─── PAGE HEADER ─── */
.page-header {
  text-align: center;
  padding: 5rem 2rem 2rem;
  position: relative;
}
.page-header .section-label { display: inline-block; margin-bottom: 0.75rem; }
.page-header h1 {
  font-size: clamp(2.2rem, 5.5vw, 3.75rem);
  font-weight: 900;
  letter-spacing: -0.035em;
  line-height: 1.1;
  margin-bottom: 1rem;
}
.page-header h1 .gradient {
  background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 50%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.page-header p {
  color: var(--muted);
  max-width: 600px;
  margin: 0 auto;
  font-size: 1.05rem;
}

/* ─── HERO ─── */
.hero {
  min-height: calc(100vh - 72px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 2rem;
  position: relative;
}
.hero-avatar {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  font-weight: 800;
  color: white;
  margin-bottom: 2rem;
  position: relative;
  z-index: 1;
  box-shadow: 0 0 60px rgba(139,92,246,0.5), 0 0 100px rgba(236,72,153,0.3);
  animation: avatarGlow 4s ease-in-out infinite;
}
@keyframes avatarGlow {
  0%, 100% { box-shadow: 0 0 60px rgba(139,92,246,0.5), 0 0 100px rgba(236,72,153,0.3); }
  50% { box-shadow: 0 0 80px rgba(236,72,153,0.6), 0 0 120px rgba(6,182,212,0.4); }
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(139,92,246,0.15);
  border: 1px solid rgba(139,92,246,0.4);
  color: #c4b5fd;
  padding: 0.4rem 1rem;
  border-radius: 999px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
  letter-spacing: 0.04em;
  position: relative;
  z-index: 1;
  backdrop-filter: blur(10px);
}
.hero-badge::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--emerald);
  box-shadow: 0 0 12px var(--emerald);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.2); }
}
.hero h1 {
  font-size: clamp(2.75rem, 8vw, 5.5rem);
  font-weight: 900;
  letter-spacing: -0.045em;
  line-height: 1;
  margin-bottom: 1.25rem;
  position: relative;
  z-index: 1;
}
.hero h1 .gradient {
  background: linear-gradient(135deg, #fff 0%, #c4b5fd 30%, var(--pink) 65%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% 200%;
  animation: gradientShift 6s ease infinite;
}
.hero-sub {
  font-size: clamp(1rem, 2.2vw, 1.2rem);
  color: var(--muted);
  max-width: 640px;
  margin: 0 auto 2.5rem;
  position: relative;
  z-index: 1;
}
.hero-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  justify-content: center;
  margin-bottom: 2.5rem;
  position: relative;
  z-index: 1;
  max-width: 600px;
}
.chip {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.35rem 0.95rem;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
  backdrop-filter: blur(10px);
  transition: all 0.2s;
}
.chip:hover {
  border-color: var(--purple);
  color: #c4b5fd;
  transform: translateY(-2px);
}
.hero-cta {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
  position: relative;
  z-index: 1;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.85rem 1.75rem;
  border-radius: 10px;
  font-size: 0.92rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.25s;
  cursor: pointer;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.btn-primary {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: #fff;
  box-shadow: 0 8px 24px rgba(139,92,246,0.35);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(236,72,153,0.45);
}
.btn-outline {
  background: rgba(255,255,255,0.04);
  color: var(--text);
  border-color: var(--border);
  backdrop-filter: blur(10px);
}
.btn-outline:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  transform: translateY(-2px);
  background: rgba(6,182,212,0.08);
}

/* ─── SECTIONS ─── */
section { padding: 3rem 2rem; max-width: 1000px; margin: 0 auto; width: 100%; }
.section-label {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
h2 {
  font-size: clamp(1.6rem, 3.2vw, 2.25rem);
  font-weight: 800;
  letter-spacing: -0.035em;
  margin-bottom: 2rem;
  color: var(--text);
}
h2 .gradient {
  background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ─── GLASS CARD BASE ─── */
.glass {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}
.glass::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
}

/* ─── ABOUT ─── */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}
@media(max-width:680px){ .about-grid { grid-template-columns: 1fr; } }
.about-card {
  padding: 2rem;
  transition: transform 0.3s, border-color 0.3s;
}
.about-card:hover { transform: translateY(-4px); border-color: rgba(139,92,246,0.4); }
.about-card h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 0.75rem;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.about-card p { color: var(--muted); font-size: 0.93rem; line-height: 1.7; }

/* ─── EXPERIENCE ─── */
.exp-card {
  padding: 2rem;
  margin-bottom: 1.5rem;
  transition: transform 0.3s, border-color 0.3s;
}
.exp-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(180deg, var(--purple), var(--pink), var(--cyan));
}
.exp-card:hover { transform: translateY(-3px); border-color: rgba(236,72,153,0.4); }
.exp-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 0.5rem;
}
.exp-title { font-size: 1.15rem; font-weight: 800; }
.exp-company {
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
  font-size: 0.95rem;
}
.exp-date {
  font-size: 0.78rem;
  color: var(--text);
  background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(236,72,153,0.2));
  border: 1px solid rgba(139,92,246,0.3);
  padding: 0.3rem 0.85rem;
  border-radius: 999px;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
}
.exp-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 1rem 0; }
.tag {
  background: rgba(139,92,246,0.12);
  border: 1px solid rgba(139,92,246,0.3);
  color: #c4b5fd;
  padding: 0.25rem 0.7rem;
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}
.tag.pink { background: rgba(236,72,153,0.12); border-color: rgba(236,72,153,0.3); color: #f9a8d4; }
.tag.cyan { background: rgba(6,182,212,0.12); border-color: rgba(6,182,212,0.3); color: #67e8f9; }
.tag.amber { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: #fcd34d; }
.exp-bullets { list-style: none; margin-top: 0.5rem; }
.exp-bullets li {
  color: var(--muted);
  font-size: 0.92rem;
  line-height: 1.7;
  padding: 0.35rem 0;
  padding-left: 1.5rem;
  position: relative;
}
.exp-bullets li::before {
  content: '▸';
  position: absolute;
  left: 0;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 0.9rem;
  top: 0.45rem;
  font-weight: 900;
}
.exp-bullets li strong { color: var(--text); font-weight: 600; }

/* ─── PROJECTS ─── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 1.5rem;
}
.project-card {
  padding: 1.75rem;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
}
.project-card:hover {
  transform: translateY(-6px);
  border-color: rgba(236,72,153,0.45);
  box-shadow: 0 20px 50px rgba(139,92,246,0.25);
}
.project-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  margin-bottom: 1.1rem;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}
.project-card h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.5rem; }
.project-card p { color: var(--muted); font-size: 0.88rem; line-height: 1.65; flex: 1; }
.project-footer { margin-top: 1.25rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }

/* ─── LEADERSHIP ─── */
.leadership-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
}
@media(max-width:680px){ .leadership-grid { grid-template-columns: 1fr; } }
.lead-card {
  padding: 1.6rem;
  transition: all 0.3s;
}
.lead-card:hover { transform: translateY(-4px); border-color: rgba(6,182,212,0.4); }
.lead-icon {
  font-size: 2rem;
  margin-bottom: 0.85rem;
  display: inline-block;
  filter: drop-shadow(0 4px 12px rgba(139,92,246,0.5));
}
.lead-card h3 {
  font-size: 1rem;
  font-weight: 800;
  margin-bottom: 0.45rem;
}
.lead-card p { color: var(--muted); font-size: 0.87rem; line-height: 1.65; }

/* ─── SOCIAL ─── */
.social-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.25rem;
}
.social-card {
  padding: 1.6rem;
  display: flex;
  gap: 1rem;
  align-items: flex-start;
  transition: all 0.3s;
}
.social-card:hover { transform: translateY(-4px); border-color: rgba(245,158,11,0.4); }
.social-emoji {
  font-size: 1.75rem;
  flex-shrink: 0;
  filter: drop-shadow(0 4px 10px rgba(236,72,153,0.5));
}
.social-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.35rem; }
.social-card p { color: var(--muted); font-size: 0.84rem; line-height: 1.6; }

/* ─── SPORTS ─── */
.sports-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1rem;
}
.sport-badge {
  padding: 1.4rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  transition: all 0.3s;
}
.sport-badge:hover { transform: translateY(-4px) scale(1.02); border-color: rgba(245,158,11,0.5); }
.sport-badge .medal {
  font-size: 2rem;
  filter: drop-shadow(0 4px 12px rgba(245,158,11,0.6));
}
.sport-badge .sport-info strong { display: block; font-size: 0.95rem; font-weight: 800; margin-bottom: 0.15rem; }
.sport-badge .sport-info span { color: var(--muted); font-size: 0.8rem; }

/* ─── SKILLS ─── */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1.25rem;
}
.skill-group {
  padding: 1.4rem;
  transition: all 0.3s;
}
.skill-group:hover { transform: translateY(-3px); border-color: rgba(139,92,246,0.4); }
.skill-group h4 {
  font-size: 0.78rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.85rem;
}
.skill-group ul { list-style: none; }
.skill-group li {
  color: var(--muted);
  font-size: 0.85rem;
  padding: 0.25rem 0;
  font-family: 'JetBrains Mono', monospace;
  border-bottom: 1px dashed rgba(255,255,255,0.05);
}
.skill-group li:last-child { border-bottom: none; }

/* ─── CONTACT ─── */
.contact-wrap { text-align: center; }
.contact-card {
  padding: 3.5rem 2rem;
  max-width: 580px;
  margin: 0 auto;
  position: relative;
}
.contact-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(236,72,153,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(6,182,212,0.12) 0%, transparent 70%);
  pointer-events: none;
  border-radius: inherit;
}
.contact-card p {
  color: var(--muted);
  margin-bottom: 2rem;
  position: relative;
  z-index: 1;
  font-size: 0.98rem;
}
.contact-links {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  justify-content: center;
  position: relative;
  z-index: 1;
}

/* ─── FOOTER ─── */
footer {
  text-align: center;
  padding: 2.5rem 2rem;
  color: var(--muted);
  font-size: 0.82rem;
  border-top: 1px solid var(--border);
  margin-top: auto;
  background: rgba(11,8,21,0.5);
  backdrop-filter: blur(10px);
  position: relative;
  z-index: 1;
}
footer span {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}

/* ─── SCROLL ANIMATION ─── */
.fade-in { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }


/* ─── Scroll progress bar ─── */
.scroll-progress {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  width: 0%;
  background: linear-gradient(90deg, var(--purple), var(--pink), var(--cyan));
  z-index: 200;
  box-shadow: 0 0 10px rgba(236,72,153,0.6);
  transition: width 0.1s linear;
}

/* ─── Sparkles ─── */
.sparkle {
  position: fixed;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: white;
  pointer-events: none;
  z-index: -1;
  opacity: 0;
  animation: sparkleFloat 6s ease-in-out infinite;
}
@keyframes sparkleFloat {
  0%   { opacity: 0; transform: translateY(0) scale(0); }
  25%  { opacity: 0.9; transform: translateY(-20px) scale(1); }
  50%  { opacity: 0.6; transform: translateY(-40px) scale(1.2); }
  75%  { opacity: 0.3; transform: translateY(-60px) scale(0.8); }
  100% { opacity: 0; transform: translateY(-80px) scale(0); }
}
.sparkle:nth-child(odd)  { background: var(--pink); box-shadow: 0 0 8px var(--pink); }
.sparkle:nth-child(3n)   { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
.sparkle:nth-child(5n)   { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

/* ─── Animated gradient border on project cards ─── */
.project-card { position: relative; }
.project-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 20px;
  padding: 1px;
  background: linear-gradient(135deg, transparent, transparent);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.4s, background 0.4s;
  pointer-events: none;
}
.project-card:hover::before {
  background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
  opacity: 1;
}

/* ─── Tilt support ─── */
.tilt {
  transform-style: preserve-3d;
  transition: transform 0.15s ease-out, box-shadow 0.3s, border-color 0.3s;
  will-change: transform;
}
.tilt-inner { transform: translateZ(20px); }

/* ─── Animated heading underline shimmer ─── */
.page-header h1, .hero h1 {
  position: relative;
  display: inline-block;
}

/* ─── Section heading shimmer line ─── */
h2::after {
  content: '';
  display: block;
  width: 64px;
  height: 3px;
  margin-top: 0.6rem;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--purple), var(--pink), var(--cyan), var(--purple));
  background-size: 300% 100%;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  0%   { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* ─── Typewriter caret ─── */
.typewriter-caret {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--pink);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: caretBlink 1s steps(2) infinite;
}
@keyframes caretBlink {
  50% { opacity: 0; }
}

/* ─── Button ripple sheen ─── */
.btn-primary::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transition: left 0.5s;
}
.btn-primary:hover::after { left: 100%; }

/* ─── Chip shimmer on hover ─── */
.chip {
  position: relative;
  overflow: hidden;
}
.chip::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left 0.5s;
}
.chip:hover::after { left: 100%; }

/* ─── BLOG FEED ─── */
.blog-feed {
  display: grid;
  gap: 1.5rem;
  max-width: 720px;
  margin: 0 auto;
}

/* ─── Hashnode cards ─── */
.hn-card {
  display: grid;
  grid-template-columns: 1fr;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  backdrop-filter: blur(14px);
  transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
  position: relative;
}
.hn-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, #8b5cf6, #ec4899, #06b6d4);
  opacity: 0;
  transition: opacity 0.3s;
}
.hn-card:hover {
  transform: translateY(-4px);

  box-shadow: 0 16px 50px rgba(139,92,246,0.18);
}
.hn-card:hover::after { opacity: 1; }
.hn-cover {

  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hn-cover img {

  display: block;
  transition: transform 0.5s;
}
.hn-card:hover .hn-cover img { transform: scale(1.04); }
.hn-cover-fallback {
  font-size: 4rem;
  filter: drop-shadow(0 6px 18px rgba(139,92,246,0.5));
}
.hn-body { padding: 1.5rem 1.75rem; }
.hn-meta {
  display: flex;
  gap: 0.5rem;

  letter-spacing: -0.01em;
  line-height: 1.3;
  margin-bottom: 0.55rem;
  background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);

.hn-brief {

.blog-footer-note {

.blog-post:hover { border-color: rgba(139,92,246,0.35); }

  <header class="page-header">
    <span class="section-label">Journal</span>
    <h1>My <span class="gradient">Blog</span></h1>
    <p>Workshops, events, conferences, and moments worth sharing.</p>
  </header>

  <section>
    <div id="feed" class="blog-feed">
      <div class="blog-empty">Loading posts…</div>
    </div>
    <div class="blog-footer-note">

<script>
const feed = document.getElementById('feed');

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

async function loadPosts() {
  try {
    const res = await fetch('posts.json?v=' + Date.now());
    if (!res.ok) throw new Error('posts.json not found');
    const data = await res.json();
    const posts = (data.posts || []).sort((a,b) => (b.date||'').localeCompare(a.date||''));

    if (!posts.length) {
      feed.innerHTML = '<div class="blog-empty">No posts yet — check back soon!</div>';
      return;
    }

    feed.innerHTML = '';
    posts.forEach(p => {
      const card = document.createElement('a');
      card.className = 'hn-card';
      card.href = p.url;
      card.target = '_blank';
      card.rel = 'noopener';
      card.innerHTML = `
        ${p.cover
          ? `<div class="hn-cover"><img src="${escapeHtml(p.cover)}" alt="" loading="lazy" /></div>`
          : '<div class="hn-cover hn-cover-fallback">📝</div>'}
        <div class="hn-body">
          <div class="hn-meta">
            <span class="hn-date">${formatDate(p.date)}</span>
            ${p.readTime ? `<span class="hn-read">· ${p.readTime} min read</span>` : ''}
          </div>
          <h2 class="hn-title">${escapeHtml(p.title)}</h2>
          ${p.brief ? `<p class="hn-brief">${escapeHtml(p.brief)}</p>` : ''}
          <div class="hn-cta">Read on Hashnode →</div>
        </div>
      `;
      feed.appendChild(card);
    });
  } catch(e) {
    console.error(e);
    feed.innerHTML = `<div class="blog-empty">Could not load posts.<br><small>${escapeHtml(e.message)}</small></div>`;
  }
}
loadPosts();
</script>
<script src="script.js"></script>
